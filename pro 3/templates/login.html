<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | College Event Registration System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      height: 100vh;
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(120deg, #f0f4ff, #dfe9f3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: #ffffff;
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      width: 420px;
      transition: 0.3s ease-in-out;
    }

    .login-box:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 35px rgba(0,0,0,0.12);
    }

    .system-heading {
      text-align: center;
      font-weight: 700;
      color: #0d47a1;
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }

    .sub-text {
      text-align: center;
      color: #555;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .form-label {
      font-weight: 600;
      color: #333;
    }

    .form-control {
      border-radius: 8px;
      padding: 0.65rem;
    }

    .btn-login {
      background-color: #0d47a1;
      border: none;
      border-radius: 8px;
      color: white;
      width: 100%;
      padding: 0.7rem;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-login:hover {
      background-color: #1565c0;
    }

    .signup-text {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #333;
    }

    .signup-text a {
      color: #0d47a1;
      text-decoration: none;
      font-weight: 500;
    }

    .signup-text a:hover {
      text-decoration: underline;
    }

    .alert {
      font-size: 0.9rem;
      padding: 0.5rem;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2 class="system-heading">College Event Registration System</h2>
    <p class="sub-text">Login to access your dashboard</p>

    {% if error %}
      <div class="alert alert-danger text-center">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
      </div>

      <button class="btn-login mt-2">Login</button>
    </form>

    <p class="signup-text">
      Don’t have an account? <a href="/signup">Create one</a>
    </p>
  </div>
</body>
</html>
