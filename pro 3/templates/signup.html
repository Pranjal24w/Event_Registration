<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Signup | College Event Registration System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      height: 100vh;
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(120deg, #f0f4ff, #dfe9f3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .signup-box {
      background: #ffffff;
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      width: 480px;
      transition: 0.3s ease-in-out;
    }

    .signup-box:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 35px rgba(0,0,0,0.12);
    }

    .system-heading {
      text-align: center;
      font-weight: 700;
      color: #0d47a1;
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }

    .sub-text {
      text-align: center;
      color: #555;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .form-label {
      font-weight: 600;
      color: #333;
    }

    .form-control {
      border-radius: 8px;
      padding: 0.65rem;
    }

    .btn-signup {
      background-color: #2e7d32;
      border: none;
      border-radius: 8px;
      color: white;
      width: 100%;
      padding: 0.7rem;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-signup:hover {
      background-color: #388e3c;
    }

    .login-text {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #333;
    }

    .login-text a {
      color: #0d47a1;
      text-decoration: none;
      font-weight: 500;
    }

    .login-text a:hover {
      text-decoration: underline;
    }

    .alert {
      font-size: 0.9rem;
      padding: 0.5rem;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="signup-box">
    <h5 class="sub-text">Create your student account</h5>

    {% if error %}
      <div class="alert alert-danger text-center">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="mb-2">
        <label class="form-label">Full Name</label>
        <input name="name" class="form-control" placeholder="Enter your full name" required>
      </div>

      <div class="mb-2">
        <label class="form-label">Email Address</label>
        <input name="email" type="email" class="form-control" placeholder="Enter your email" required>
      </div>

      <div class="mb-2">
        <label class="form-label">Password</label>
        <input name="password" type="password" class="form-control" placeholder="Create a password" required>
      </div>

      <div class="mb-2">
        <label class="form-label">Phone</label>
        <input name="phone" class="form-control" placeholder="Enter your phone number" required>
      </div>

      <div class="mb-2">
        <label class="form-label">Department</label>
        <select name="department" class="form-control" required>
          <option value="">Select Department</option>
          <option value="CSD">CSD</option>
          <option value="CO">CO</option>
          <option value="AIDS">AIDS</option>
          <option value="IT">IT</option>
          <option value="RnD">RnD</option>
          <option value="ENTC">ENTC</option>
          <option value="MECH">MECH</option>
          <option value="ELECT">ELECT</option>
          <option value="CHEM">CHEM</option>
          <option value="CIVIL">CIVIL</option>
        </select>
      </div>

      <div class="mb-2">
        <label class="form-label">Year</label>
        <select name="year" class="form-control" required>
          <option value="">Select Year</option>
          <option value="1st">1st Year</option>
          <option value="2nd">2nd Year</option>
          <option value="3rd">3rd Year</option>
          <option value="4th">4th Year</option>
        </select>
      </div>

      <button class="btn-signup mt-3">Sign Up</button>
    </form>

    <p class="login-text">
      Already have an account? <a href="/login">Login</a>
    </p>
  </div>
</body>
</html>
